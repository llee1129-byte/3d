<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 도시 환경</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87c8ff;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    .ui {
      position: fixed;
      left: 12px;
      top: 12px;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
      z-index: 10;
      max-width: 420px;
    }
    .hint { margin-top: 6px; color: #d7f7ff; font-size: 13px; }
    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 10px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    .crosshair::before, .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 2px;
    }
    .crosshair::before { left: 4px; top: 0; width: 2px; height: 10px; }
    .crosshair::after { top: 4px; left: 0; width: 10px; height: 2px; }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.15);
      color: white;
      font-size: 20px;
      z-index: 20;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }
    .warning {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      background: rgba(180, 30, 30, 0.9);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
      z-index: 25;
      display: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      border: 2px solid rgba(255,255,255,0.25);
      user-select: none;
    }
    .warning.show {
      display: block;
    }
    .bus-help {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(20, 80, 170, 0.92);
      color: #fff;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      z-index: 26;
      display: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      border: 2px solid rgba(255,255,255,0.22);
      user-select: none;
      text-align: center;
      line-height: 1.4;
    }
    .bus-help.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="ui">
    <div><b>3D 도시 환경</b></div>
    <div>이동: W A S D</div>
    <div>시점 회전: 마우스 드래그</div>
    <div>경사로 / 버스정류장</div>
    <div class="hint">오르막은 더 빠르게, 내리막은 더 느리게 반대로 조정했습니다.</div>
  </div>
  <div class="warning" id="warning">⚠ 올라갈 때와 내려갈 때 조심하세요!</div>
  <div class="bus-help" id="busHelp">🚌 버스에 도달했습니다! 도움이 필요하면 주변 사람에게 요청하세요.</div>
  <div class="crosshair"></div>
  <div class="overlay" id="overlay">화면을 클릭한 뒤 마우스를 움직여 시점을 돌리고<br>WASD로 이동하세요</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let keys = {};
    let yaw = 0, pitch = 0;
    let isDragging = false, lastMouseX = 0, lastMouseY = 0;
    const clock = new THREE.Clock();
    const player = { position: new THREE.Vector3(0, 2, 18) };
    const warningEl = document.getElementById('warning');
    const busHelpEl = document.getElementById('busHelp');

    const ramp = {
      x: 0,
      startZ: 12,
      midZ: 34,
      endZ: 56,
      rise: 2.2
    };

    const busTarget = new THREE.Vector3(0, 0, 94);

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87c8ff);
      scene.fog = new THREE.Fog(0x87c8ff, 35, 320);

      camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
      camera.position.copy(player.position);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.72));
      const sun = new THREE.DirectionalLight(0xffffff, 1.25);
      sun.position.set(50, 90, 35);
      scene.add(sun);

      createGround();
      createBuildings();
      createRampPair();
      createTrafficLight();
      createBusStop();
      createBusAfterRamp();
      createTreesAndStreetLights();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
      window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
      window.addEventListener('mousedown', onMouseDown);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', () => isDragging = false);
      window.addEventListener('click', () => document.getElementById('overlay').style.display = 'none');
    }

    function createGround() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(600, 600),
        new THREE.MeshStandardMaterial({ color: 0x77b36d })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);
    }

    function createBuildings() {
      for (let i = -6; i <= 6; i++) {
        for (let j = -6; j <= 6; j++) {
          const px = i * 22;
          const pz = j * 22;
          const distRamp = Math.hypot(px, pz - 34);
          if (distRamp < 40) continue;
          if (Math.abs(px) < 18 && Math.abs(pz) < 18) continue;
          if (Math.abs(px) < 14 && pz > 8 && pz < 70) continue;
          if (Math.min(Math.abs(px), Math.abs(pz)) < 12) continue;
          const h = 6 + Math.random() * 26;
          const b = new THREE.Mesh(
            new THREE.BoxGeometry(7 + Math.random() * 8, h, 7 + Math.random() * 8),
            new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.18, 0.45) })
          );
          b.position.set(px, h / 2, pz);
          scene.add(b);
        }
      }
    }

    function createRampPair() {
      const rampMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
      const railMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
      const length = 22, rise = ramp.rise, width = 10;
      const angle = Math.atan(rise / length);
      const startZ = ramp.startZ, midZ = ramp.midZ, endZ = ramp.endZ;

      const upRamp = new THREE.Mesh(new THREE.BoxGeometry(width, 0.7, length), rampMat);
      upRamp.position.set(0, 0.35 + rise / 2, (startZ + midZ) / 2);
      upRamp.rotation.x = -angle;
      scene.add(upRamp);

      const topPlatform = new THREE.Mesh(new THREE.BoxGeometry(width + 2, 0.25, 6), rampMat);
      topPlatform.position.set(0, 2.12, midZ + 3);
      scene.add(topPlatform);

      const downRamp = new THREE.Mesh(new THREE.BoxGeometry(width, 0.7, length), rampMat);
      downRamp.position.set(0, 0.35 + rise / 2, (midZ + endZ) / 2);
      downRamp.rotation.x = angle;
      scene.add(downRamp);

      const rail1 = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, length * 2 + 8, 10), railMat);
      rail1.rotation.z = Math.PI / 2;
      rail1.position.set(-4.7, 1.3, (startZ + endZ) / 2);
      scene.add(rail1);

      const rail2 = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, length * 2 + 8, 10), railMat);
      rail2.rotation.z = Math.PI / 2;
      rail2.position.set(4.7, 1.3, (startZ + endZ) / 2);
      scene.add(rail2);
    }

    function createTrafficLight() {
      const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
      const boxMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 8, 12), poleMat);
      pole.position.set(10, 4, 9);
      scene.add(pole);
      const arm = new THREE.Mesh(new THREE.BoxGeometry(6, 0.25, 0.25), poleMat);
      arm.position.set(12.4, 7.5, 9);
      scene.add(arm);
      const lightBox = new THREE.Mesh(new THREE.BoxGeometry(1.1, 2.6, 1.1), boxMat);
      lightBox.position.set(15.1, 6.1, 9);
      scene.add(lightBox);
    }

    function createBusStop() {
      const stopGroup = new THREE.Group();
      const roofMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });
      const glassMat = new THREE.MeshStandardMaterial({ color: 0x9fd6ff, transparent: true, opacity: 0.35 });
      const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
      const benchMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });

      const roof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.35, 3.4), roofMat);
      roof.position.set(0, 4.2, 0);
      stopGroup.add(roof);

      const backGlass = new THREE.Mesh(new THREE.BoxGeometry(8.4, 3.2, 0.12), glassMat);
      backGlass.position.set(0, 2.65, -1.55);
      stopGroup.add(backGlass);

      const sideGlass1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 3.2, 3.1), glassMat);
      sideGlass1.position.set(-4.2, 2.65, 0);
      stopGroup.add(sideGlass1);

      const sideGlass2 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 3.2, 3.1), glassMat);
      sideGlass2.position.set(4.2, 2.65, 0);
      stopGroup.add(sideGlass2);

      const leg1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4.2, 10), poleMat);
      leg1.position.set(-4, 2.1, -1.2);
      stopGroup.add(leg1);

      const leg2 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4.2, 10), poleMat);
      leg2.position.set(4, 2.1, -1.2);
      stopGroup.add(leg2);

      const bench = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.35, 0.8), benchMat);
      bench.position.set(-0.5, 1.0, 0.4);
      stopGroup.add(bench);

      const seatLeg1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.95, 0.12), benchMat);
      seatLeg1.position.set(-1.8, 0.55, 0.4);
      stopGroup.add(seatLeg1);

      const seatLeg2 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.95, 0.12), benchMat);
      seatLeg2.position.set(0.8, 0.55, 0.4);
      stopGroup.add(seatLeg2);

      const signPole = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 3.8, 8), poleMat);
      signPole.position.set(5.8, 1.9, 0);
      stopGroup.add(signPole);

      const sign = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.18), new THREE.MeshStandardMaterial({ color: 0x2c7be5 }));
      sign.position.set(5.8, 3.7, 0);
      stopGroup.add(sign);

      stopGroup.position.set(0, 0, 84);
      scene.add(stopGroup);
    }

    function createBusAfterRamp() {
      const bus = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(10, 3, 4), new THREE.MeshStandardMaterial({ color: 0xffb000 }));
      body.position.y = 1.5;
      bus.add(body);

      const doorLeft = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2, 1), new THREE.MeshStandardMaterial({ color: 0x222222 }));
      doorLeft.position.set(5.06, 0.5, 0.55);
      doorLeft.rotation.y = -1.0;
      bus.add(doorLeft);

      const doorRight = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2, 1), new THREE.MeshStandardMaterial({ color: 0x222222 }));
      doorRight.position.set(5.06, 0.5, -0.55);
      doorRight.rotation.y = 1.0;
      bus.add(doorRight);

      bus.position.set(0, 0.12, 94);
      bus.rotation.y = Math.PI;
      scene.add(bus);
    }

    function createTreesAndStreetLights() {
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x7a4a21 });
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x2f7d32 });
      const lampPoleMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
      const lampHeadMat = new THREE.MeshStandardMaterial({ color: 0xddddaa, emissive: 0x111100 });

      const positions = [
        [-18, -8], [18, -8], [-18, 24], [18, 24],
        [-24, 48], [24, 48], [-30, 74], [30, 74],
        [-36, 100], [36, 100], [-40, 126], [40, 126]
      ];

      positions.forEach(([x, z], idx) => {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 4, 8), trunkMat);
        trunk.position.y = 2;
        tree.add(trunk);
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.8 + (idx % 3) * 0.15, 10, 10), leafMat);
        leaves.position.y = 4.8;
        tree.add(leaves);
        tree.position.set(x, 0, z);
        scene.add(tree);

        const lamp = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 5.5, 10), lampPoleMat);
        pole.position.y = 2.75;
        lamp.add(pole);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.7), lampHeadMat);
        head.position.set(0, 5.15, 0);
        lamp.add(head);
        lamp.position.set(-x, 0, z + 6);
        scene.add(lamp);
      });
    }

    function onMouseDown(e) { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; }
    function onMouseMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - lastMouseX, dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX; lastMouseY = e.clientY;
      yaw -= dx * 0.003;
      pitch -= dy * 0.003;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }

    function getGroundY(x, z) {
      const startZ = ramp.startZ, midZ = ramp.midZ, endZ = ramp.endZ;
      if (Math.abs(x) < 4.5 && z >= startZ && z < midZ) return 2 + ((z - startZ) / (midZ - startZ)) * ramp.rise;
      if (Math.abs(x) < 4.5 && z >= midZ && z <= endZ) return 2 + ramp.rise - ((z - midZ) / (endZ - midZ)) * ramp.rise;
      return 2;
    }

    function getSlopeFactor(x, z, movingForward) {
      const onRamp = Math.abs(x) < 4.5 && z >= ramp.startZ && z <= ramp.endZ;
      if (!onRamp) return 1;

      if (movingForward > 0) {
        return (z < ramp.midZ) ? 1.35 : 0.45;
      } else if (movingForward < 0) {
        return (z > ramp.midZ) ? 1.35 : 0.45;
      }
      return 1;
    }

    function updateWarning() {
      const onRamp = Math.abs(player.position.x) < 4.5 && player.position.z >= ramp.startZ && player.position.z <= ramp.endZ;
      const movingUp = keys['w'] && player.position.z < ramp.midZ;
      const movingDown = keys['s'] && player.position.z > ramp.midZ;

      if (onRamp && (movingUp || movingDown)) {
        warningEl.classList.add('show');
        warningEl.textContent = movingUp
          ? '⚠ 올라갈 때 조심하세요!'
          : '⚠ 내려갈 때 조심하세요!';
      } else if (onRamp) {
        warningEl.classList.add('show');
        warningEl.textContent = '⚠ 올라갈 때와 내려갈 때 조심하세요!';
      } else {
        warningEl.classList.remove('show');
      }
    }

    function updateBusHelp() {
      const dx = player.position.x - busTarget.x;
      const dz = player.position.z - busTarget.z;
      const dist = Math.hypot(dx, dz);
      if (dist < 16) {
        busHelpEl.classList.add('show');
      } else {
        busHelpEl.classList.remove('show');
      }
    }

    function updatePlayer(delta) {
      let speed = 10;
      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

      const movingForward = keys['w'] ? 1 : (keys['s'] ? -1 : 0);
      const movingSide = keys['d'] ? 1 : (keys['a'] ? -1 : 0);

      let moveVec = new THREE.Vector3();
      if (movingForward !== 0) moveVec.addScaledVector(forward, movingForward);
      if (movingSide !== 0) moveVec.addScaledVector(right, movingSide);

      if (moveVec.lengthSq() > 0) {
        moveVec.normalize();
        speed *= getSlopeFactor(player.position.x, player.position.z, movingForward);
        player.position.addScaledVector(moveVec, delta * speed);
      }

      player.position.y += (getGroundY(player.position.x, player.position.z) - player.position.y) * Math.min(1, delta * 8);
      camera.position.copy(player.position);
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      updateWarning();
      updateBusHelp();
    }

    function animate() {
      requestAnimationFrame(animate);
      updatePlayer(clock.getDelta());
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
  </script>
</body>
</html>
